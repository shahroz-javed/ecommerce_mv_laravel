services:
    traefik:
        image: traefik:v2.10
        command:
            - "--api.insecure=true"                         # Dashboard for monitoring
            - "--providers.docker=true"                     # Read Docker labels
            - "--providers.docker.exposedbydefault=false"  # Only expose containers with labels
            - "--entrypoints.web.address=:80"
        ports:
            - "80:80"     # HTTP
            - "8080:8080" # Traefik dashboard
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - sail
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.4'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.4/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
            - 'localhost:host-gateway'
        # ports:
        #     - '${APP_PORT:-80}:80'
        #     - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - mailpit
        labels:
            - "traefik.enable=true"

            # Central domain router
            - "traefik.http.routers.central.rule=Host(`localhost`,`127.0.0.1`,`store.test`)"
            - "traefik.http.routers.central.entrypoints=web"
            - "traefik.http.routers.central.service=laravel"

            # Tenant subdomains router
            # - "traefik.http.routers.tenants.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.store.test`)"
            - "traefik.http.routers.tenants.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.localhost`)"
            - "traefik.http.routers.tenants.entrypoints=web"
            - "traefik.http.routers.tenants.service=laravel"

            # Shared service
            - "traefik.http.services.laravel.loadbalancer.server.port=80"

    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: phpmyadmin
        environment:
            PMA_HOST: mysql              # <-- match service name, not "db"
            PMA_USER: '${DB_USERNAME}'   # e.g. sail
            PMA_PASSWORD: '${DB_PASSWORD}'
        ports:
            - "8090:80"                  # open at http://localhost:8090
        depends_on:
            - mysql
        restart: unless-stopped
        networks:
            - sail

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
